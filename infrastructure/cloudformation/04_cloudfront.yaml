AWSTemplateFormatVersion: "2010-09-09"

Description: |
  Prompt Engineering Workshop - CloudFront distribution with ALB origin,
  custom domain, and origin verification via secret header.

Parameters:
  Domain:
    Type: String
    Description: Root domain name (e.g., example.com)

  Subdomain:
    Type: String
    Default: workshop
    Description: Subdomain for the CloudFront distribution (e.g., workshop.example.com)

  CertificateArn:
    Type: String
    Description: ACM Certificate ARN in us-east-1 for CloudFront (must cover subdomain.domain)

  ALBDnsName:
    Type: String
    Default: ""
    Description: DNS name of the ALB (leave empty to import from Streamlit stack)

  AppPort:
    Type: Number
    Default: 8084
    Description: Port the ALB listens on for the Streamlit app

  OriginSecretHeaderName:
    Type: String
    Default: X-Origin-Verify
    Description: Custom header name for origin verification

  OriginSecretHeaderValue:
    Type: String
    Default: ""
    Description: Custom header value for origin verification (leave empty to auto-generate)
    NoEcho: true

  WebACLArn:
    Type: String
    Default: ""
    Description: ARN of a WAF Web ACL to associate with CloudFront (optional, e.g. arn:aws:wafv2:us-east-1:ACCOUNT:global/webacl/NAME/ID)

  StreamlitStackName:
    Type: String
    Default: prompt-workshop-streamlit
    Description: Name of the Streamlit stack (to import ALB DNS if ALBDnsName is empty)

Conditions:
  HasWebACL: !Not [!Equals [!Ref WebACLArn, ""]]
  GenerateSecret: !Equals [!Ref OriginSecretHeaderValue, ""]
  HasALBParam: !Not [!Equals [!Ref ALBDnsName, ""]]

Resources:
  # ================================
  # Secrets Manager - Origin Verification
  # ================================
  OriginVerificationSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "cloudfront/${AWS::StackName}-alb-handshake"
      Description: Secret header for CloudFront-to-ALB origin verification
      SecretString: !Sub
        - '{"HEADER_NAME":"${HeaderName}","HEADER_VALUE":"${HeaderValue}"}'
        - HeaderName: !Ref OriginSecretHeaderName
          HeaderValue: !If
            - GenerateSecret
            - !Select [2, !Split ["/", !Ref "AWS::StackId"]]
            - !Ref OriginSecretHeaderValue
      Tags:
        - Key: Project
          Value: prompt-engineering-workshop

  # ================================
  # CloudFront Distribution
  # ================================
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Prompt Engineering Workshop
        DefaultRootObject: ""
        HttpVersion: http2and3
        PriceClass: PriceClass_All

        Aliases:
          - !Sub "${Subdomain}.${Domain}"

        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

        WebACLId: !If
          - HasWebACL
          - !Ref WebACLArn
          - !Ref "AWS::NoValue"

        Origins:
          - Id: StreamlitALB
            DomainName: !If
              - HasALBParam
              - !Ref ALBDnsName
              - !ImportValue
                Fn::Sub: "${StreamlitStackName}-LoadBalancerDNS"
            CustomOriginConfig:
              HTTPSPort: !Ref AppPort
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 5
            OriginCustomHeaders:
              - HeaderName: !Ref OriginSecretHeaderName
                HeaderValue: !If
                  - GenerateSecret
                  - !Select [2, !Split ["/", !Ref "AWS::StackId"]]
                  - !Ref OriginSecretHeaderValue

        DefaultCacheBehavior:
          TargetOriginId: StreamlitALB
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          # Disable caching for dynamic Streamlit content
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # SecurityHeadersPolicy

        # WebSocket support for Streamlit
        CacheBehaviors:
          - PathPattern: "/_stcore/stream"
            TargetOriginId: StreamlitALB
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3
            Compress: true

      Tags:
        - Key: Project
          Value: prompt-engineering-workshop

  # ================================
  # Route53 Record for CloudFront
  # ================================
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub "${Domain}."
      Name: !Sub "${Subdomain}.${Domain}"
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID
        DNSName: !GetAtt Distribution.DomainName
        EvaluateTargetHealth: false

  DNSRecordIPv6:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub "${Domain}."
      Name: !Sub "${Subdomain}.${Domain}"
      Type: AAAA
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
        EvaluateTargetHealth: false

Outputs:
  DistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref Distribution
    Export:
      Name: !Sub "${AWS::StackName}-DistributionId"

  DistributionDomainName:
    Description: CloudFront Distribution domain name
    Value: !GetAtt Distribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-DistributionDomainName"

  WorkshopURL:
    Description: Workshop URL (custom domain)
    Value: !Sub "https://${Subdomain}.${Domain}"

  OriginSecretName:
    Description: Secrets Manager secret name for origin verification
    Value: !Ref OriginVerificationSecret
    Export:
      Name: !Sub "${AWS::StackName}-OriginSecretName"
